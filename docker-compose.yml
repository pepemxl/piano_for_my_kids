services:
  mysql:
    image: mysql:8.4
    container_name: piano_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: piano_for_my_kids
      MYSQL_USER: piano_user
      MYSQL_PASSWORD: piano_password
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      # schema.sql is auto-loaded by the mysql container on first start.
      - ./db/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-prootpassword"]
      interval: 5s
      timeout: 5s
      retries: 20

  app:
    build: .
    container_name: piano_app
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      PORT: 3000
      SESSION_SECRET: dev-secret-change-me
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: piano_user
      DB_PASSWORD: piano_password
      DB_NAME: piano_for_my_kids
    ports:
      - "3000:3000"
    volumes:
      # Bind-mount source for hot reload. node_modules stays in the container.
      - ./:/app
      - app_node_modules:/app/node_modules

  adminer:
    image: adminer:latest
    container_name: piano_adminer
    restart: unless-stopped
    depends_on:
      - mysql
    ports:
      - "8080:8080"
    environment:
      ADMINER_DEFAULT_SERVER: mysql

volumes:
  mysql_data:
  app_node_modules:
